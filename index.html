  <script type="text/html" id="srcB"><!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>WM 2026 – K.o.-Runde</title>
<style>
  :root{
    --bg1:#0a1330; --bg2:#16245e; --bg3:#0c1740;
    --card:rgba(255,255,255,.05);
    --card-bd:var(--line);
    --slot:rgba(255,255,255,.04);
    --gold:#f4c64a; --gold-d:#d9a521;
    --line:rgba(160,190,255,.62);
    --line-win:rgba(128,172,255,.95);
    --txt:#eef2ff; --muted:#8190c4;
    --row-h:32px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:#0a1330;}
  /* echte dunkle Grundfläche als unterste Ebene (iOS-Dark-Mode-robust) */
  .bg{position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(120% 80% at 50% -10%, #243a86 0%, var(--bg2) 38%, var(--bg1) 78%, var(--bg3) 100%);}
  .app{position:relative; z-index:1; min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    color:var(--txt); padding:10px 10px;
    padding-top:calc(14px + env(safe-area-inset-top));
    padding-bottom:calc(48px + env(safe-area-inset-bottom));}

  header{text-align:center; margin:6px 0 14px;}
  header .k{font-size:13px; letter-spacing:.32em; font-weight:700; color:var(--gold);
    text-transform:uppercase; opacity:.92;}
  header h1{margin:2px 0 0; font-size:30px; font-weight:800; letter-spacing:.06em;
    text-transform:uppercase; line-height:1;
    background:linear-gradient(180deg,#fff 0%,#cdd8ff 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  header .hr{width:140px; height:2px; margin:11px auto 0;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);}

  .toolbar{display:flex; align-items:center; justify-content:center; gap:10px;
    flex-wrap:wrap; margin-bottom:12px;}
  .hint{font-size:12px; color:var(--muted); text-align:center;}
  .btn{appearance:none; border:1px solid var(--card-bd); background:var(--card);
    color:var(--txt); font-size:12.5px; font-weight:600; padding:7px 13px;
    border-radius:9px; cursor:pointer; letter-spacing:.02em;}
  .btn:active{background:rgba(255,255,255,.12);}
  .zoom{position:fixed; left:0; right:0; bottom:0; z-index:40;
    display:flex; align-items:center; gap:11px;
    padding:4px 15px; padding-bottom:calc(4px + env(safe-area-inset-bottom));
    background:rgba(14,25,66,.92); -webkit-backdrop-filter:blur(10px);
    backdrop-filter:blur(10px); border-top:1px solid rgba(150,180,255,.3);}
  .zbtn{appearance:none; flex:0 0 auto; width:22px; height:22px; border:none;
    background:transparent; color:var(--muted); font-size:18px; font-weight:700;
    line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
    padding:0; -webkit-user-select:none; user-select:none; touch-action:manipulation;}
  .zbtn:active{color:var(--txt);}
  .zrange{flex:1 1 auto; height:22px; margin:0; padding:0; background:transparent;
    -webkit-appearance:none; appearance:none; cursor:pointer; touch-action:manipulation;
    --fill:50%;}
  .zrange::-webkit-slider-runnable-track{height:4px; border-radius:3px;
    background:linear-gradient(90deg, rgba(128,172,255,.92) var(--fill), rgba(255,255,255,.15) var(--fill));}
  .zrange::-webkit-slider-thumb{-webkit-appearance:none; appearance:none;
    width:18px; height:18px; margin-top:-7px; border-radius:50%;
    background:#dde5ff; box-shadow:0 1px 4px rgba(0,0,0,.55);}
  .zrange::-moz-range-track{height:4px; border-radius:3px; background:rgba(255,255,255,.15);}
  .zrange::-moz-range-progress{height:4px; border-radius:3px; background:rgba(128,172,255,.92);}
  .zrange::-moz-range-thumb{width:18px; height:18px; border:none; border-radius:50%;
    background:#dde5ff;}

  .scroll{overflow:auto; -webkit-overflow-scrolling:touch; padding:6px 4px 10px;
    border-radius:14px;}
  .zoomer{position:relative;}
  .bracket{position:relative; display:flex; align-items:stretch; gap:20px;
    width:max-content; padding-top:24px; transform-origin:top left;}

  svg.lines{position:absolute; top:0; left:0;
    pointer-events:none; z-index:0; overflow:visible;}

  .round{position:relative; z-index:1; display:flex; flex-direction:column;
    justify-content:space-around; flex:0 0 auto;}
  .round.r0{gap:4px;}
  .round.r0,.round.r1,.round.r2,.round.r3,.round.r4{width:258px;}
  .round.champ{width:208px; justify-content:center;}

  .rlabel{position:absolute; top:-22px; left:0; right:0; text-align:center;
    font-size:10.5px; letter-spacing:.18em; text-transform:uppercase;
    font-weight:700; color:var(--gold); white-space:nowrap;}

  .match{display:flex; flex-direction:row; align-items:center;
    padding:0 8px; position:relative; flex:0 0 auto;}

  /* Datum / Uhrzeit vor der Paarung */
  .dt{flex:0 0 auto; width:46px; display:flex; flex-direction:column;
    align-items:center; gap:1px; margin-right:8px;}
  .dt input{width:100%; background:transparent; border:none; padding:1px 0;
    text-align:center; font-family:inherit; line-height:1.1; cursor:text;
    border-radius:4px; -webkit-appearance:none;}
  .dt input.d{font-size:11px; color:var(--muted); font-weight:600;}
  .dt input.t{font-size:13.5px; color:var(--txt); font-weight:700;
    letter-spacing:.2px; font-variant-numeric:tabular-nums;}
  .dt input::placeholder{color:var(--muted); opacity:.55;}
  .dt input:focus{outline:none; background:rgba(160,190,255,.16);}

  .pair{flex:1 1 auto; border:1.6px solid var(--card-bd); border-radius:9px;
    overflow:hidden; background:var(--card); backdrop-filter:blur(2px);}
  .slot{display:flex; align-items:center; gap:7px; height:var(--row-h);
    padding:0 7px; cursor:pointer; font-size:12px; line-height:1;
    border-bottom:1px solid var(--line);
    transition:background .12s;}
  .slot:last-child{border-bottom:0;}
  .slot:active{background:rgba(255,255,255,.10);}
  .slot .flag{font-size:15px; width:19px; text-align:center; flex:0 0 auto;}
  .slot .nm{flex:1 1 auto; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; font-weight:600;}
  .slot .score{flex:0 0 auto; width:26px; height:22px; margin-left:5px;
    border:1px solid var(--card-bd); border-radius:5px;
    background:rgba(8,14,40,.55); color:var(--txt);
    font-size:13px; font-weight:700; text-align:center; padding:0;
    font-family:inherit; -webkit-appearance:none;}
  .slot .score:focus{outline:none; border-color:var(--gold);
    background:rgba(244,198,74,.12);}
  .slot .score:disabled{opacity:.3;}
  .slot.locked{cursor:default;}
  .slot.locked .score{cursor:default;}
  .slot.empty{color:var(--muted); cursor:default; font-style:italic; font-weight:500;}
  .slot.empty:active{background:transparent;}
  .slot.win{background:rgba(86,134,238,.34); box-shadow:inset 3px 0 0 var(--line-win);}
  .slot.win .nm{font-weight:800; color:#eff3ff;}
  .slot.win .score{background:rgba(110,155,240,.34); color:var(--txt);
    border-color:rgba(150,185,255,.55);}
  .slot.loser{opacity:.45;}

  /* Champion / Endstand (Top 4) – Höhe & Position per alignFinish() an Finale+Platz3 angeglichen */
  .champ-box{position:absolute; left:11px; right:11px;}
  .cup{position:absolute; left:0; right:0; bottom:100%; margin-bottom:7px; text-align:center;
    font-size:44px; line-height:1; filter:drop-shadow(0 4px 10px rgba(244,198,74,.35));}
  .finish{border:1.5px solid var(--gold); border-radius:12px; overflow:hidden;
    background:linear-gradient(180deg,rgba(244,198,74,.15),rgba(244,198,74,.03));
    display:flex; flex-direction:column;}
  .finish .ttl{flex:0 0 auto; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--gold);
    font-weight:700; text-align:center; padding:8px 0 7px; border-bottom:1px solid rgba(244,198,74,.25);}
  .rank{flex:1 1 0; min-height:0; display:flex; align-items:center; gap:8px; padding:0 11px; font-size:13.5px;
    border-bottom:1px solid rgba(244,198,74,.13);}
  .rank:last-child{border-bottom:0;}
  .rpos{width:16px; flex:0 0 auto; text-align:center; font-weight:800; font-size:12px; color:var(--muted);}
  .rflag{flex:0 0 auto; font-size:16px; width:19px; text-align:center;}
  .rnm{font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .rnm.ph{color:var(--muted); font-weight:600;}
  .rank.gold{background:rgba(244,198,74,.14);}
  .rank.gold .rpos{color:var(--gold);}
  .rank.gold .rnm{font-weight:800; color:#fff5dc;}

  /* Finale + Spiel um Platz 3 (Platz-3 schwebt unter dem Finale) */
  .finwrap{position:relative;}
  .match3{position:absolute; top:100%; left:0; right:0; margin-top:30px;}
  .m3lbl{text-align:center; margin-bottom:8px; font-size:9.5px; letter-spacing:.16em;
    text-transform:uppercase; font-weight:700; color:var(--muted);}

  /* Confirm-Overlay (kein confirm()/alert()) */
  .overlay{position:fixed; inset:0; z-index:50; display:none;
    align-items:center; justify-content:center; padding:24px;
    background:rgba(6,10,28,.72); backdrop-filter:blur(3px);}
  .overlay.show{display:flex;}
  .sheet{width:100%; max-width:300px; border:1px solid var(--card-bd);
    border-radius:16px; padding:20px 18px;
    background:linear-gradient(180deg,#1a2860,#121d49); text-align:center;}
  .sheet h3{margin:0 0 6px; font-size:16px;}
  .sheet p{margin:0 0 16px; font-size:13px; color:var(--muted); line-height:1.4;}
  .sheet .row{display:flex; gap:10px;}
  .sheet .btn{flex:1; justify-content:center; text-align:center;}
  .btn.warn{background:linear-gradient(180deg,#e0563f,#c23a26); border-color:#e0563f; color:#fff;}
</style>
</head>

<div class="bg"></div>
<div class="app">
  <header>
    <div class="k">Die K.o.-Runde der</div>
    <h1>WM 2026</h1>
    <div class="hr"></div>
  </header>

  <div class="toolbar">
    <div class="hint">Ergebnis eintippen — der Sieger rückt automatisch weiter.</div>
  </div>

  <div class="scroll" id="scroll">
    <div class="zoomer" id="zoomer">
      <div class="bracket" id="bracket">
        <svg class="lines" id="lines"></svg>
      </div>
    </div>
  </div>

  <div class="third" id="third"></div>
</div>

<div class="zoom" id="zoomCtl">
  <button class="zbtn" id="zoomOut" aria-label="kleiner">−</button>
  <input type="range" class="zrange" id="zrange" min="40" max="160" step="5" value="100" aria-label="Zoom">
  <button class="zbtn" id="zoomIn" aria-label="größer">+</button>
</div>

<script>
(function(){
  "use strict";

  // ---- Setzliste (32 Teams, aus den Original-Screenshots verifiziert) ----
  // Reihenfolge = Paarungen: (1,2)(3,4)... -> 16 Sechzehntelfinal-Spiele
  // id = offizielle WM-Team-ID der Datenquelle (worldcup26.ir) für den automatischen Abgleich
  const TEAMS = [
    {n:"Deutschland",   f:"🇩🇪", id:17}, {n:"Paraguay",      f:"🇵🇾", id:14},
    {n:"Frankreich",    f:"🇫🇷", id:33}, {n:"Schweden",      f:"🇸🇪", id:23},
    {n:"Südafrika",     f:"🇿🇦", id:2},  {n:"Kanada",        f:"🇨🇦", id:5},
    {n:"Niederlande",   f:"🇳🇱", id:21}, {n:"Marokko",       f:"🇲🇦", id:10},
    {n:"Kolumbien",     f:"🇨🇴", id:44}, {n:"Ghana",         f:"🇬🇭", id:47},
    {n:"Spanien",       f:"🇪🇸", id:29}, {n:"Österreich",    f:"🇦🇹", id:39},
    {n:"USA",           f:"🇺🇸", id:13}, {n:"Bosnien-Herz.", f:"🇧🇦", id:6},
    {n:"Belgien",       f:"🇧🇪", id:25}, {n:"Senegal",       f:"🇸🇳", id:34},
    {n:"Brasilien",     f:"🇧🇷", id:9},  {n:"Japan",         f:"🇯🇵", id:22},
    {n:"Elfenbeinküste",f:"🇨🇮", id:19}, {n:"Norwegen",      f:"🇳🇴", id:36},
    {n:"Mexiko",        f:"🇲🇽", id:1},  {n:"Ecuador",       f:"🇪🇨", id:20},
    {n:"England",       f:"🏴󠁧󠁢󠁥󠁮󠁧󠁿", id:45}, {n:"DR Kongo",      f:"🇨🇩", id:42},
    {n:"Argentinien",   f:"🇦🇷", id:37}, {n:"Kap Verde",     f:"🇨🇻", id:30},
    {n:"Australien",    f:"🇦🇺", id:15}, {n:"Ägypten",       f:"🇪🇬", id:26},
    {n:"Schweiz",       f:"🇨🇭", id:8},  {n:"Algerien",      f:"🇩🇿", id:38},
    {n:"Portugal",      f:"🇵🇹", id:41}, {n:"Kroatien",      f:"🇭🇷", id:46}
  ];

  const LABELS = ["Letzte 32","Achtelfinale","Viertelfinale","Halbfinale","Finale"];
  const COUNTS = [16,8,4,2,1]; // Spiele pro Runde

  // ---- State ----
  // winner[r][p] = 0 (oben) | 1 (unten) | null
  const winner = COUNTS.map(c => new Array(c).fill(null));
  // official[r][p] = true: echtes (beendetes) Ergebnis aus der Datenquelle -> gesperrt
  const official = COUNTS.map(c => new Array(c).fill(false));
  // scores[r][p] = [Tore oben, Tore unten]; dts[r][p] = [Datum, Uhrzeit]
  const scores = COUNTS.map(c => Array.from({length:c}, () => ["",""]));
  // Offizielle Termine WM 2026 (deutsche Zeit / MESZ), zugeordnet zur Bracket-Position.
  // Runde 0 in Setzliste-Reihenfolge; Folgerunden über Sieger-Nummern zugeordnet u. mehrfach verifiziert.
  const DTS = [
    // Letzte 32 (Paarungen 0..15)
    [["29.06.","22:30"],["30.06.","23:00"],["28.06.","21:00"],["30.06.","03:00"],
     ["04.07.","03:30"],["02.07.","21:00"],["02.07.","02:00"],["01.07.","22:00"],
     ["29.06.","19:00"],["30.06.","19:00"],["01.07.","03:00"],["01.07.","18:00"],
     ["04.07.","00:00"],["03.07.","20:00"],["03.07.","05:00"],["03.07.","01:00"]],
    // Achtelfinale (0..7)
    [["04.07.","23:00"],["04.07.","19:00"],["06.07.","21:00"],["07.07.","02:00"],
     ["05.07.","22:00"],["06.07.","02:00"],["07.07.","18:00"],["07.07.","22:00"]],
    // Viertelfinale (0..3)
    [["09.07.","22:00"],["10.07.","21:00"],["11.07.","23:00"],["12.07.","03:00"]],
    // Halbfinale (0..1)
    [["14.07.","21:00"],["15.07.","21:00"]],
    // Finale
    [["19.07.","21:00"]]
  ];
  const cloneDTS = () => DTS.map(rd => rd.map(m => [m[0], m[1]]));
  const dts    = cloneDTS();
  let third = null;        // 0|1|null – Sieger Spiel um Platz 3
  let official3 = false;   // echtes Ergebnis Spiel um Platz 3 -> gesperrt
  let score3 = ["",""];    // Ergebnis Spiel um Platz 3
  let dt3 = ["18.07.","23:00"];   // Datum/Uhrzeit Spiel um Platz 3
  let zoom = 1;            // Zoomfaktor (+/- Tasten)

  // ---- Speichern / Laden (eigene Eingaben bleiben beim nächsten Aufruf erhalten) ----
  const STORE_KEY = "wm2026-bracket-2";
  function saveState(){
    try{
      localStorage.setItem(STORE_KEY, JSON.stringify({v:1, winner, scores, dts, third, score3, dt3, official, official3}));
    }catch(e){/* z.B. privater Modus / Vorschau – dann eben nicht gespeichert */}
  }
  function loadState(){
    try{
      const raw = localStorage.getItem(STORE_KEY);
      if(!raw) return;
      const d = JSON.parse(raw);
      if(!d || d.v!==1) return;
      const S = x => String(x==null?"":x);
      for(let r=0;r<COUNTS.length;r++) for(let p=0;p<COUNTS[r];p++){
        if(d.winner && d.winner[r] && (d.winner[r][p]===0||d.winner[r][p]===1||d.winner[r][p]===null))
          winner[r][p]=d.winner[r][p];
        if(d.scores && d.scores[r] && Array.isArray(d.scores[r][p]))
          scores[r][p]=[S(d.scores[r][p][0]), S(d.scores[r][p][1])];
        if(d.dts && d.dts[r] && Array.isArray(d.dts[r][p]))
          dts[r][p]=[S(d.dts[r][p][0]), S(d.dts[r][p][1])];
        if(d.official && d.official[r] && typeof d.official[r][p]==="boolean")
          official[r][p]=d.official[r][p];
      }
      if(d.third===0||d.third===1||d.third===null) third=d.third;
      if(typeof d.official3==="boolean") official3=d.official3;
      if(Array.isArray(d.score3)) score3=[S(d.score3[0]), S(d.score3[1])];
      if(Array.isArray(d.dt3))    dt3=[S(d.dt3[0]), S(d.dt3[1])];
    }catch(e){/* defekter Speicher -> Default-Stand */}
  }

  // Team in Slot (r,p,side)
  function slotTeam(r,p,side){
    if(r===0) return TEAMS[p*2+side];
    const cp = p*2+side;
    const w = winner[r-1][cp];
    return w===null ? null : slotTeam(r-1,cp,w);
  }
  function loserTeam(r,p){
    const w = winner[r][p];
    return w===null ? null : slotTeam(r,p, w===0?1:0);
  }

  // Sieger aus Ergebnis: eindeutig -> 0/1, sonst null (Gleichstand/leer)
  function scoreWinner(a,b){
    if(a==="" || b==="") return null;
    const na=+a, nb=+b;
    if(Number.isNaN(na) || Number.isNaN(nb)) return null;
    if(na>nb) return 0;
    if(nb>na) return 1;
    return null;
  }

  // Folgerunden (Sieger + Ergebnisse) entwerten, wenn sich etwas ändert
  function invalidateAfter(r,p){
    for(let rr=r+1; rr<COUNTS.length; rr++){
      const pp = Math.floor(p / Math.pow(2, rr-r));
      winner[rr][pp]=null;
      scores[rr][pp]=["",""];        // Tore gehören zu konkreten Teams -> löschen
      official[rr][pp]=false;        // gelöschtes Folge-Ergebnis ist nicht mehr "echt"
    }
    third=null; score3=["",""]; official3=false;   // HF-Verlierer können sich geändert haben
  }

  function setWinner(r,p,side){
    if(winner[r][p]===side){ winner[r][p]=null; }   // erneut tippen = abwählen
    else { winner[r][p]=side; }
    invalidateAfter(r,p);
    render();
  }

  const bracket=document.getElementById("bracket");
  const thirdEl=document.getElementById("third");

  function esc(s){ return (s==null?"":(""+s)).replace(/"/g,"&quot;"); }

  function slotHTML(r,p,side){
    const t=slotTeam(r,p,side);
    const w=winner[r][p];
    const val=esc(scores[r][p][side]);
    if(!t){
      return `<div class="slot empty"><span class="flag">·</span>`
           + `<span class="nm">Sieger</span>`
           + `<input class="score" type="text" inputmode="numeric" maxlength="2" disabled value=""></div>`;
    }
    let cls="slot";
    if(w===side) cls+=" win";
    else if(w!==null) cls+=" loser";
    const lk=official[r][p];
    if(lk) cls+=" locked";
    return `<div class="${cls}" data-r="${r}" data-p="${p}" data-s="${side}">`
         + `<span class="flag">${t.f}</span><span class="nm">${t.n}</span>`
         + `<input class="score" type="text" inputmode="numeric" maxlength="2" `
         + `data-fid="s-${r}-${p}-${side}" value="${val}" placeholder="–"${lk?" readonly":""}></div>`;
  }

  function matchHTML(r,p){
    const d=esc(dts[r][p][0]), t=esc(dts[r][p][1]);
    return `<div class="match" data-mr="${r}" data-mp="${p}">`
         + `<div class="dt">`
         + `<input class="d" type="text" maxlength="6" data-fid="d-${r}-${p}" value="${d}" placeholder="TT.MM.">`
         + `<input class="t" type="text" maxlength="5" data-fid="t-${r}-${p}" value="${t}" placeholder="HH:MM">`
         + `</div>`
         + `<div class="pair">${slotHTML(r,p,0)}${slotHTML(r,p,1)}</div></div>`;
  }

  // Spiel um Platz 3 – gleicher Look wie ein normales Spiel (Datum/Zeit vorne),
  // sitzt unter dem Finale. data-t3 statt data-r für die Sieger-Auswahl.
  function thirdMatchHTML(){
    const lA=loserTeam(3,0), lB=loserTeam(3,1);
    const d=esc(dt3[0]), t=esc(dt3[1]);
    const row=(team,side)=>{
      const val=esc(score3[side]);
      if(!team) return `<div class="slot empty"><span class="flag">·</span>`
           + `<span class="nm">Verlierer HF</span>`
           + `<input class="score" type="text" inputmode="numeric" maxlength="2" disabled value=""></div>`;
      let cls="slot"+(third===side?" win":(third!==null?" loser":""));
      if(official3) cls+=" locked";
      return `<div class="${cls}" data-t3="${side}"><span class="flag">${team.f}</span>`
           + `<span class="nm">${team.n}</span>`
           + `<input class="score" type="text" inputmode="numeric" maxlength="2" `
           + `data-fid="s3-${side}" value="${val}" placeholder="–"${official3?" readonly":""}></div>`;
    };
    return `<div class="match3">`
         + `<div class="m3lbl">Spiel um Platz 3</div>`
         + `<div class="match">`
         + `<div class="dt">`
         + `<input class="d" type="text" maxlength="6" data-fid="d3" value="${d}" placeholder="TT.MM.">`
         + `<input class="t" type="text" maxlength="5" data-fid="t3" value="${t}" placeholder="HH:MM">`
         + `</div>`
         + `<div class="pair">${row(lA,0)}${row(lB,1)}</div>`
         + `</div></div>`;
  }


  function render(){
    let html="";
    for(let r=0;r<COUNTS.length;r++){
      let inner=`<div class="rlabel">${LABELS[r]}</div>`;
      if(r===4){
        // Finale + Spiel um Platz 3 zusammen (Platz-3 schwebt absolut unter dem Finale)
        inner+=`<div class="finwrap">${matchHTML(4,0)}${thirdMatchHTML()}</div>`;
      } else {
        for(let p=0;p<COUNTS[r];p++) inner+=matchHTML(r,p);
      }
      html+=`<div class="round r${r}">${inner}</div>`;
    }

    // ---- Letzte Spalte: Pokal + Endstand (Top 4) ----
    const champ = winner[4][0]===null ? null : slotTeam(4,0,winner[4][0]);
    const vize  = loserTeam(4,0);                       // Finalverlierer = Platz 2
    const lA=loserTeam(3,0), lB=loserTeam(3,1);         // Halbfinal-Verlierer
    let r3=null, r4=null;
    if(third!==null){ r3 = third===0?lA:lB; r4 = third===0?lB:lA; }
    const rankRow=(pos,t,gold)=>{
      const body = t
        ? `<span class="rflag">${t.f}</span><span class="rnm">${t.n}</span>`
        : `<span class="rflag">·</span><span class="rnm ph">—</span>`;
      return `<div class="rank${gold?' gold':''}"><span class="rpos">${pos}</span>${body}</div>`;
    };
    html+=`<div class="round champ"><div class="rlabel">Weltmeister</div>`
        + `<div class="champ-box"><div class="cup">🏆</div>`
        + `<div class="finish"><div class="ttl">Endstand</div>`
        + rankRow(1, champ, true)
        + rankRow(2, vize, false)
        + rankRow(3, r3, false)
        + rankRow(4, r4, false)
        + `</div></div></div>`;

    bracket.innerHTML = `<svg class="lines" id="lines"></svg>` + html;
    thirdEl.innerHTML = "";   // separater Platz-3-Block wird nicht mehr genutzt

    saveState();
    requestAnimationFrame(drawLines);
  }

  // Neu zeichnen, aber Fokus + Cursor im aktiven Eingabefeld erhalten
  function renderKeepFocus(){
    const ae=document.activeElement;
    const fid=(ae && ae.dataset)?ae.dataset.fid:null;
    let ss=null;
    if(fid){ try{ ss=ae.selectionStart; }catch(_){ ss=null; } }
    render();
    if(fid){
      const el=document.querySelector('[data-fid="'+fid+'"]');
      if(el){ el.focus(); try{ if(ss!=null) el.setSelectionRange(ss,ss); }catch(_){} }
    }
  }

  // Endstand-Box bündig zu Finale (oben) und Spiel um Platz 3 (unten) ausrichten
  function alignFinish(){
    const finMatch = bracket.querySelector('.finwrap > .match');
    const p3       = bracket.querySelector('.match3');
    const champCol = bracket.querySelector('.round.champ');
    const champBox = bracket.querySelector('.champ-box');
    const finish   = bracket.querySelector('.finish');
    if(!finMatch || !p3 || !champCol || !champBox || !finish) return;
    const z = zoom || 1;
    const colTop = champCol.getBoundingClientRect().top;
    const ft = finMatch.getBoundingClientRect().top;    // Finale-Oberkante
    const pb = p3.getBoundingClientRect().bottom;        // Platz-3-Unterkante
    champBox.style.top    = ((ft - colTop) / z) + 'px';
    finish.style.height   = ((pb - ft) / z) + 'px';
  }

  function drawLines(){
    const svg=bracket.querySelector("svg.lines");
    if(!svg) return;
    alignFinish();
    const z=zoom||1;
    const base=bracket.getBoundingClientRect();
    const W=bracket.offsetWidth, H=bracket.offsetHeight;
    svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
    svg.setAttribute("width",W); svg.setAttribute("height",H);
    let paths="";
    const pairRect=(r,p)=>{
      const el=bracket.querySelector(`.match[data-mr="${r}"][data-mp="${p}"] .pair`);
      if(!el) return null;
      const b=el.getBoundingClientRect();
      return {l:(b.left-base.left)/z, r:(b.right-base.left)/z, t:(b.top-base.top)/z, h:b.height/z};
    };
    const matchLeft=(r,p)=>{
      const el=bracket.querySelector(`.match[data-mr="${r}"][data-mp="${p}"]`);
      return el ? (el.getBoundingClientRect().left-base.left)/z : null;
    };
    // Linie: rechte Kante der Quell-Paarung -> Anfang des Ziel-Spiels (vor dem Datum)
    for(let r=1;r<COUNTS.length;r++){
      for(let p=0;p<COUNTS[r];p++){
        const dst=pairRect(r,p); if(!dst) continue;
        const dxL=matchLeft(r,p); if(dxL===null) continue;
        const dy=dst.t+dst.h/2, dx=dxL;
        for(let side=0;side<2;side++){
          const src=pairRect(r-1,p*2+side); if(!src) continue;
          const sx=src.r, sy=src.t+src.h/2;
          const mx=(sx+dx)/2;
          const col = (winner[r-1][p*2+side]!==null) ? "var(--line-win)" : "var(--line)";
          paths+=`<path d="M${sx} ${sy} H${mx} V${dy} H${dx}" fill="none" stroke="${col}" stroke-width="1.6"/>`;
        }
      }
    }
    svg.innerHTML=paths;
  }

  // ---- Eingaben: Datum / Uhrzeit / Ergebnis ----
  function readFid(el){
    const fid=(el && el.dataset)?el.dataset.fid:null; if(!fid) return null;
    const a=fid.split("-");
    return {fid, kind:a[0], r:+a[1], p:+a[2], side:+a[3]};
  }
  // Eingaben: Datum/Zeit speichern; Ergebnis auswerten
  bracket.addEventListener("input",e=>{
    const f=readFid(e.target); if(!f) return;
    if(f.kind==="d"){ dts[f.r][f.p][0]=e.target.value; saveState(); return; }
    if(f.kind==="t"){ dts[f.r][f.p][1]=e.target.value; saveState(); return; }
    if(f.kind!=="s") return;
    if(official[f.r][f.p]){ renderKeepFocus(); return; }   // echtes Ergebnis -> Eingabe verwerfen
    scores[f.r][f.p][f.side]=e.target.value;
    const a=scores[f.r][f.p][0], b=scores[f.r][f.p][1];
    // 0:0 ist in der K.o.-Runde kein Endergebnis -> Spiel zurücksetzen (Striche)
    if(a!=="" && b!=="" && +a===0 && +b===0){
      scores[f.r][f.p]=["",""];
      if(winner[f.r][f.p]!==null){ winner[f.r][f.p]=null; invalidateAfter(f.r,f.p); }
      renderKeepFocus(); return;
    }
    const w=scoreWinner(a,b);
    if(w!==null && winner[f.r][f.p]!==w){
      winner[f.r][f.p]=w; invalidateAfter(f.r,f.p); renderKeepFocus();
    }
  });

  // ---- Interaktion: Sieger antippen ----
  bracket.addEventListener("click",e=>{
    if(e.target.closest("input")) return;          // Eingabefelder nicht als Klick werten
    const s=e.target.closest(".slot");
    if(!s || s.classList.contains("empty")) return;
    if(s.dataset.r===undefined) return;
    if(official[+s.dataset.r][+s.dataset.p]) return;   // echtes Ergebnis -> nicht anklickbar
    setWinner(+s.dataset.r, +s.dataset.p, +s.dataset.s);
  });

  // ---- Spiel um Platz 3 (sitzt jetzt im Bracket, unter dem Finale) ----
  bracket.addEventListener("input",e=>{
    const el=e.target, fid=(el.dataset?el.dataset.fid:null); if(!fid) return;
    if(fid==="d3"){ dt3[0]=el.value; saveState(); return; }
    if(fid==="t3"){ dt3[1]=el.value; saveState(); return; }
    if((fid==="s3-0"||fid==="s3-1") && official3){ renderKeepFocus(); return; }
    if(fid==="s3-0") score3[0]=el.value;
    else if(fid==="s3-1") score3[1]=el.value;
    else return;
    const a=score3[0], b=score3[1];
    if(a!=="" && b!=="" && +a===0 && +b===0){
      score3=["",""]; if(third!==null) third=null; renderKeepFocus(); return;
    }
    const w=scoreWinner(a,b);
    if(w!==null && third!==w){ third=w; renderKeepFocus(); }
  });
  bracket.addEventListener("click",e=>{
    if(e.target.closest("input")) return;
    const s=e.target.closest(".slot");
    if(!s || s.classList.contains("empty") || s.dataset.t3===undefined) return;
    if(official3) return;                              // echtes Ergebnis -> nicht anklickbar
    const side=+s.dataset.t3;
    third = (third===side)?null:side;
    render();
  });

  // ---- Zoom (Schieberegler) ----
  const zoomer=document.getElementById("zoomer");
  const zrange=document.getElementById("zrange");
  function applyZoom(){
    bracket.style.transform = zoom===1 ? "none" : `scale(${zoom})`;
    const w=bracket.offsetWidth, h=bracket.offsetHeight;
    zoomer.style.width  = (w*zoom)+"px";
    zoomer.style.height = (h*zoom)+"px";
    const pct = (zoom*100 - 40) / (160 - 40) * 100;   // Reglerfüllung
    zrange.style.setProperty("--fill", pct.toFixed(1)+"%");
    requestAnimationFrame(drawLines);
  }
  function setZoom(z){
    zoom = Math.min(1.6, Math.max(0.4, Math.round(z*100)/100));
    if(+zrange.value !== Math.round(zoom*100)) zrange.value = Math.round(zoom*100);
    applyZoom();
  }
  zrange.addEventListener("input",()=>setZoom(+zrange.value/100));
  document.getElementById("zoomIn").addEventListener("click",()=>setZoom(zoom+0.1));
  document.getElementById("zoomOut").addEventListener("click",()=>setZoom(zoom-0.1));

  // ===== Automatischer Ergebnis-Abgleich mit der offiziellen Datenquelle =====
  // Datenquelle: worldcup26.ir (kostenlos, ohne Schlüssel, CORS offen).
  // Läuft auf echter Domain (GitHub Pages / Homescreen). Im Claude-Vorschau-Sheet
  // scheitern externe Abrufe – dann bleibt einfach der gespeicherte/manuelle Stand.
  const API_URL = "https://worldcup26.ir/get/games";
  const TYPE_BY_ROUND = ["r32","r16","qf","sf","final"]; // Bracket-Runden 0..4

  function applyLiveGames(games){
    const byType = {};
    for(const g of games){
      const t = g && g.type; if(!t) continue;
      (byType[t] = byType[t] || []).push(g);
    }
    const num = v => { const n = parseInt(v,10); return isNaN(n) ? null : n; };
    const isFin = g => String(g.finished).toUpperCase() === "TRUE";
    const find = (list, idA, idB) => list && list.find(g => {
      const h = num(g.home_team_id), a = num(g.away_team_id);
      return (h===idA && a===idB) || (h===idB && a===idA);
    });
    // Trägt API-Tore seitenrichtig ein; gibt true zurück, wenn etwas geändert wurde
    function put(g, teamTop, setScore, getScore, setWin, curWin){
      if(!isFin(g)) return false;
      const h = num(g.home_team_id);
      let so, su;
      if(h===teamTop.id){ so=num(g.home_score); su=num(g.away_score); }
      else              { so=num(g.away_score); su=num(g.home_score); }
      if(so===null || su===null) return false;
      let ch=false;
      const cur=getScore();
      if(cur[0]!==String(so) || cur[1]!==String(su)){ setScore([String(so),String(su)]); ch=true; }
      const w = scoreWinner(String(so), String(su));
      if(w!==null && curWin()!==w){ setWin(w); ch=true; }
      return ch;
    }
    let changed=false;
    for(let r=0;r<5;r++){
      const list = byType[TYPE_BY_ROUND[r]];
      for(let p=0;p<COUNTS[r];p++){
        const tA=slotTeam(r,p,0), tB=slotTeam(r,p,1);
        if(!tA||!tB) continue;
        const g=find(list, tA.id, tB.id); if(!g) continue;
        if(isFin(g) && !official[r][p]){ official[r][p]=true; changed=true; }
        if(put(g, tA,
              v=>{scores[r][p]=v;}, ()=>scores[r][p],
              w=>{winner[r][p]=w; invalidateAfter(r,p);}, ()=>winner[r][p])) changed=true;
      }
    }
    // Spiel um Platz 3
    const lA=loserTeam(3,0), lB=loserTeam(3,1);
    if(lA&&lB){
      const g=find(byType["third"], lA.id, lB.id);
      if(g){
        if(isFin(g) && !official3){ official3=true; changed=true; }
        if(put(g, lA, v=>{score3=v;}, ()=>score3, w=>{third=w;}, ()=>third)) changed=true;
      }
    }
    return changed;
  }

  function fetchLive(){
    const timeout = new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")), 9000));
    Promise.race([ fetch(API_URL, {cache:"no-store"}).then(r=>r.json()), timeout ])
      .then(data=>{
        const games = data && data.games;
        if(!Array.isArray(games)) return;
        if(applyLiveGames(games)){ saveState(); render(); }
      })
      .catch(()=>{ /* Vorschau/offline/Quelle weg -> manueller Stand bleibt erhalten */ });
  }

  window.addEventListener("resize",()=>applyZoom());
  loadState();
  render();
  applyZoom();
  fetchLive();
})();
[[SCRIPTEND]]
</body>

  <script type="text/html" id="srcS"><!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>WM 2026 – Monte-Carlo-Simulator</title>
<style>
  :root{
    --bg:#0f1830; --bg2:#0b1226; --card:#172441; --card2:#1d2c4e;
    --gold:#f4c64a; --blue:#6e9bf0; --blue-d:#4a6aa8;
    --txt:#e7edff; --muted:#9fb0d6; --line:#2a3a5e; --win:#f4c64a;
    --bar:#6e9bf0; --bar-top:#f4c64a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px; line-height:1.4; padding:14px 12px 60px;
    max-width:680px; margin:0 auto;
  }
  /* feste dunkle Grundfläche (gegen iOS-Dark-Mode-Overlay) */
  #bgfix{position:fixed; inset:0; z-index:0; background:var(--bg);}
  .app{position:relative; z-index:1;}

  header{text-align:center; margin-bottom:9px;}
  header h1{font-size:19px; font-weight:800; margin:0; letter-spacing:.3px;}
  header .sub{font-size:12px; color:var(--muted); margin-top:3px;}

  .panel{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:10px 13px; margin-bottom:10px;}
  .grp{padding:6px 0; border-bottom:1px solid var(--line);}
  .grp:first-child{padding-top:2px;}
  .grp:last-child{border-bottom:0; padding-bottom:2px;}
  .grp-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
  .grp-label{font-size:13px; font-weight:700; color:var(--txt);}
  .grp-val{font-size:15px; font-weight:800; color:var(--gold); font-variant-numeric:tabular-nums;}
  .hint{font-size:11px; color:var(--muted); display:flex; justify-content:space-between; margin-top:4px;}
  /* Turnierfaktor */
  .spec{font-size:9px; font-weight:700; color:#1a1305; background:var(--gold);
    padding:1px 6px; border-radius:7px; letter-spacing:.03em; margin-left:5px; vertical-align:1px;}
  .tfwarn{display:none; font-size:11px; color:var(--muted); margin-top:9px; line-height:1.5;
    background:rgba(244,198,74,.07); border:1px solid rgba(244,198,74,.22);
    border-radius:9px; padding:8px 10px;}
  .tfwarn b{color:#ffd96b;}
  .tflink{display:block; margin-top:6px; background:none; border:none; color:var(--blue);
    font-family:inherit; font-size:11px; font-weight:800; cursor:pointer; padding:2px 0; text-align:left;}
  .tfinfo{display:none; margin-top:10px; padding-top:11px; border-top:1px solid var(--line);}
  .tfinfo.on{display:block;}
  .tfinfo p{margin:0 0 9px; font-size:11.5px; color:var(--muted); line-height:1.55;}
  .tfinfo p b{color:var(--txt);}
  .fp-title{font-size:10.5px; font-weight:800; color:var(--gold); text-align:center;
    text-transform:uppercase; letter-spacing:.05em; margin:2px 0 6px;}
  .fpsvg{width:100%; height:auto; display:block; margin-bottom:3px;}


  /* Slider */
  input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:30px;
    background:transparent; cursor:pointer; margin:0; touch-action:none;}
  input[type=range]::-webkit-slider-runnable-track{height:6px; border-radius:3px;
    background:linear-gradient(90deg,var(--blue) var(--fill,50%),#243355 var(--fill,50%));}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; appearance:none;
    width:24px; height:24px; border-radius:50%; background:var(--gold);
    border:3px solid #1a2440; margin-top:-9px; box-shadow:0 2px 5px rgba(0,0,0,.4);}
  input[type=range]:disabled{opacity:.4;}
  input[type=range]:disabled::-webkit-slider-thumb{background:var(--muted);}

  /* Toggle */
  .switch{position:relative; width:50px; height:28px; flex:0 0 auto;}
  .switch input{opacity:0; width:0; height:0; position:absolute;}
  .slider-sw{position:absolute; inset:0; background:#243355; border-radius:28px; transition:.2s;}
  .slider-sw:before{content:""; position:absolute; height:22px; width:22px; left:3px; top:3px;
    background:#fff; border-radius:50%; transition:.2s;}
  .switch input:checked + .slider-sw{background:var(--gold);}
  .switch input:checked + .slider-sw:before{transform:translateX(22px);}

  /* Lauf-Buttons + Tabs */
  .seg{display:flex; gap:6px;}
  .seg button{flex:1; padding:9px 4px; border:1px solid var(--line); background:#142036;
    color:var(--muted); border-radius:9px; font-family:inherit; font-size:13px; font-weight:700;
    cursor:pointer; transition:.12s;}
  .seg button.on{background:var(--blue); color:#0b1226; border-color:var(--blue);}

  .tabs{display:flex; gap:8px; margin-bottom:10px;}
  .tabs button{flex:1; padding:11px 5px; border:1px solid var(--line); background:var(--card);
    color:var(--muted); border-radius:11px; font-family:inherit; font-size:12.5px; font-weight:700;
    cursor:pointer; transition:.12s;}
  .tabs button.on{background:var(--gold); color:#1a1305; border-color:var(--gold);}

  .view{display:none;}
  .view.on{display:block;}

  /* Wahrscheinlichkeits-Liste */
  .status{font-size:12px; color:var(--muted); text-align:center; padding:6px 0 11px; min-height:26px;}
  .rowlist{display:flex; flex-direction:column; gap:3px;}
  .row{background:var(--card); border:1px solid var(--line); border-radius:9px;
    padding:5px 9px; display:flex; align-items:center; gap:7px;}
  .row .flag{font-size:16px; width:21px; text-align:center; flex:0 0 auto;}
  .row .mid{flex:1 1 auto; min-width:0;}
  .row .nm{font-size:12.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .row .det{font-size:9.5px; color:var(--muted); margin-top:1px; font-variant-numeric:tabular-nums;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .row .barwrap{flex:0 0 78px; height:8px; background:#1a2740; border-radius:5px; overflow:hidden;}
  .row .bar{height:100%; background:var(--bar); border-radius:5px; transition:width .35s ease;}
  .row.top .bar{background:var(--bar-top);}
  .row .pct{flex:0 0 42px; text-align:right; font-size:13px; font-weight:800;
    font-variant-numeric:tabular-nums;}
  .row.top .pct{color:var(--gold);}

  /* einzeilige Tabelle, beide Modi mit Kopfzeile */

<body>
<div id="bgfix"></div>
<div class="app">
  <header>

<script>
(function(){
  "use strict";
  const LN10 = Math.LN10;

  // Teams in Bracket-Slot-Reihenfolge (Pos 0–15, je oben/unten)
  const TEAMS = [
    {n:"Deutschland",c:"GER",p:1735.77,f:"🇩🇪",tf:0.0696}, {n:"Paraguay",c:"PAR",p:1505.35,f:"🇵🇾",tf:0.0501},
    {n:"Frankreich",c:"FRA",p:1870.70,f:"🇫🇷",tf:0.0818}, {n:"Schweden",c:"SWE",p:1509.79,f:"🇸🇪",tf:-0.0133},
    {n:"Südafrika",c:"RSA",p:1428.38,f:"🇿🇦",tf:null},  {n:"Kanada",c:"CAN",p:1559.48,f:"🇨🇦",host:1,tf:null},
    {n:"Niederlande",c:"NED",p:1753.57,f:"🇳🇱",tf:0.0622},{n:"Marokko",c:"MAR",p:1755.10,f:"🇲🇦",tf:0.0748},
    {n:"Kolumbien",c:"COL",p:1698.35,f:"🇨🇴",tf:-0.0142},  {n:"Ghana",c:"GHA",p:1380.00,f:"🇬🇭",tf:null},
    {n:"Spanien",c:"ESP",p:1874.71,f:"🇪🇸",tf:-0.0284},    {n:"Österreich",c:"AUT",p:1597.40,f:"🇦🇹",tf:null},
    {n:"USA",c:"USA",p:1671.23,f:"🇺🇸",host:1,tf:-0.0957}, {n:"Bosnien-Herz.",c:"BIH",p:1387.22,f:"🇧🇦",tf:null},
    {n:"Belgien",c:"BEL",p:1742.24,f:"🇧🇪",tf:0.1094},    {n:"Senegal",c:"SEN",p:1684.07,f:"🇸🇳",tf:null},
    {n:"Brasilien",c:"BRA",p:1765.86,f:"🇧🇷",tf:0.0301},  {n:"Japan",c:"JPN",p:1661.58,f:"🇯🇵",tf:-0.0388},
    {n:"Elfenbeinküste",c:"CIV",p:1540.87,f:"🇨🇮",tf:null},{n:"Norwegen",c:"NOR",p:1557.44,f:"🇳🇴",tf:null},
    {n:"Mexiko",c:"MEX",p:1687.48,f:"🇲🇽",host:1,tf:0.0149},{n:"Ecuador",c:"ECU",p:1598.52,f:"🇪🇨",tf:null},
    {n:"England",c:"ENG",p:1828.02,f:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",tf:-0.0649},   {n:"DR Kongo",c:"COD",p:1474.43,f:"🇨🇩",tf:null},
    {n:"Argentinien",c:"ARG",p:1877.27,f:"🇦🇷",tf:0.0892},{n:"Kap Verde",c:"CPV",p:1350.00,f:"🇨🇻",tf:null},
    {n:"Australien",c:"AUS",p:1579.34,f:"🇦🇺",tf:-0.0277}, {n:"Ägypten",c:"EGY",p:1562.37,f:"🇪🇬",tf:null},
    {n:"Schweiz",c:"SUI",p:1650.06,f:"🇨🇭",tf:0.0478},    {n:"Algerien",c:"ALG",p:1571.03,f:"🇩🇿",tf:null},
    {n:"Portugal",c:"POR",p:1767.85,f:"🇵🇹",tf:-0.0467},   {n:"Kroatien",c:"CRO",p:1714.87,f:"🇭🇷",tf:0.1124},
  ];
  const NT = TEAMS.length; // 32

  // Namensanzeige: 'full' = voller Name, 'code' = FIFA-3-Buchstaben-Kürzel
  let nameMode = 'code';
  const teamLabel = t => nameMode === 'code' ? t.c : t.n;
  let SCORES_IN_NAME_MODE = false;  // Tore nur im Kürzel-Modus (Namen sonst zu kurz)
  const scoresVisible = () => nameMode==='code' || SCORES_IN_NAME_MODE;
  // Cache der letzten Ergebnisse (Umschalten soll NICHT neu simulieren/würfeln)
  let lastSim = null, lastProb = null;

  // Parameter-State
  let DIV = 600, HOME_ON = false, HOME_BONUS = 75, NRUN = 100000;
  let TF_ON = false, TF_STR = 1.0;
  const TF_K = 4/LN10;   // Turnierfaktor -> Elo-Bonus, divisor-konsistent

  function effPts(){
    const p = new Float64Array(NT);
    const k = TF_ON ? DIV*TF_K*TF_STR : 0;
    for(let i=0;i<NT;i++){
      let v = TEAMS[i].p + (HOME_ON && TEAMS[i].host ? HOME_BONUS : 0);
      if(TF_ON && TEAMS[i].tf!=null) v += TEAMS[i].tf * k;
      p[i] = v;
    }
    return p;
  }

  // ---- Aggregat: N Turniere, Wahrscheinlichkeiten pro Runde ----
  function runMany(N){
    const pts = effPts();
    const af=new Float64Array(NT), vf=new Float64Array(NT),
          hf=new Float64Array(NT), fin=new Float64Array(NT), tit=new Float64Array(NT);
    const cur=new Int32Array(NT), nxt=new Int32Array(NT);
    for(let s=0;s<N;s++){
      for(let i=0;i<NT;i++) cur[i]=i;
      let len=NT;
      while(len>1){
        const half=len>>1;
        for(let m=0;m<half;m++){
          const a=cur[2*m], b=cur[2*m+1];
          const ea = 1/(1+Math.exp(LN10*(pts[b]-pts[a])/DIV));
          nxt[m] = Math.random()<ea ? a : b;
        }
        for(let m=0;m<half;m++) cur[m]=nxt[m];
        len=half;
        const arr = half===16?af : half===8?vf : half===4?hf : half===2?fin : tit;
        for(let m=0;m<half;m++) arr[cur[m]]++;
      }
    }
    const out=[];
    for(let i=0;i<NT;i++) out.push({
      i, af:af[i]/N*100, vf:vf[i]/N*100, hf:hf[i]/N*100, fin:fin[i]/N*100, tit:tit[i]/N*100
    });
    return out;
  }

  // ---- Einzel: ein Turnier, voller Verlauf inkl. Spiel um Platz 3 ----
  // ===== Ergebnis-Modell: plausibler Score zu gegebener Elo-Siegquote =====
  // Datenbasis: 1052 WM-Spiele. Sieger bleibt hart über Elo (Quoten exakt),
  // nur der Score wird per Poisson drangehängt, konditioniert auf den Sieger.
  const MU=2.7;                 // erwartete Gesamttore/Spiel (90 Min, moderne Ära)
  const PK=11;                  // Tor-Obergrenze für pmf-Summen
  const SCALE=1.62677;          // eicht Phasen-Rate auf 33,5% K.o.-Schnitt
  const PEN=21.3/33.5;          // Anteil Elfmeterschießen an "über 90 hinaus"
  const REMIS_B=[0,1,2,3], REMIS_W=[0.36,0.43,0.16,0.05]; // Remis-Stände (Daten)

  function poissonPmf(lam){
    const a=new Array(PK); a[0]=Math.exp(-lam);
    for(let k=1;k<PK;k++) a[k]=a[k-1]*lam/k;
    return a;
  }
  function poissonSample(lam){
    const L=Math.exp(-lam); let k=0, pr=1;
    do{ k++; pr*=Math.random(); } while(pr>L);
    return k-1;
  }
  function pick(vals, ws){
    let u=Math.random();
    for(let i=0;i<vals.length;i++){ u-=ws[i]; if(u<0) return vals[i]; }
    return vals[vals.length-1];
  }
  // Favoriten-Toranteil s, so dass bedingtes Poisson die Siegquote p (>=.5) trifft
  function condWinProb(s){
    const pf=poissonPmf(MU*s), pu=poissonPmf(MU*(1-s));
    let PF=0,PU=0;
    for(let i=0;i<PK;i++) for(let j=0;j<PK;j++){
      if(i>j) PF+=pf[i]*pu[j]; else if(i<j) PU+=pf[i]*pu[j];
    }
    return PF/(PF+PU);
  }
  function sForP(p){
    if(Math.abs(p-0.5)<1e-9) return 0.5;
    if(p<0.5) return 1-sForP(1-p);
    let lo=0.5, hi=0.9999;
    for(let i=0;i<50;i++){ const m=(lo+hi)/2; if(condWinProb(m)<p) lo=m; else hi=m; }
    return (lo+hi)/2;
  }
  // reguläres Ergebnis: bedingtes Poisson, gibt [Sieger-Tore, Verlierer-Tore]
  function scoreReg(favWins, lamF, lamU){
    for(let it=0; it<80; it++){
      const gF=poissonSample(lamF), gU=poissonSample(lamU);
      if(gF===gU) continue;
      if((gF>gU)===favWins) return favWins ? [gF,gU] : [gU,gF];
    }
    return [1,0];
  }
  function scoreAet(){ const r=pick(REMIS_B,REMIS_W); return [r+(Math.random()<0.78?1:2), r]; }
  function scorePen(){ const w=pick([3,4,5],[0.42,0.40,0.18]), d=pick([1,2,3],[0.55,0.34,0.11]);
    return [w, Math.max(0,w-d)]; }

  // Ein K.o.-Spiel: Elo bestimmt Quote, Phase+Score werden plausibel gezogen
  function playMatch(ia, ib, pts){
    const ea = 1/(1+Math.exp(LN10*(pts[ib]-pts[ia])/DIV));  // P(a gewinnt)
    const aFav = ea>=0.5;
    const iFav = aFav?ia:ib, iUnd = aFav?ib:ia;
    const p = aFav?ea:1-ea;                                 // Favoriten-Quote >=.5
    const s = sForP(p), lamF=MU*s, lamU=MU*(1-s);
    const pf=poissonPmf(lamF), pu=poissonPmf(lamU);
    let rem=0; for(let k=0;k<PK;k++) rem+=pf[k]*pu[k];
    const over=Math.min(0.55, rem*SCALE);
    const Preg=1-over, Paet=over*(1-PEN), Ppen=over*PEN, base=Preg+Paet;
    let q=(p-0.5*Ppen)/base, qpen=0.5;
    if(q>1){ q=1; qpen=(p-base)/Ppen; }                     // Elfer-Verfeinerung
    const u=Math.random();
    const phase = u<Preg?'reg':(u<Preg+Paet?'aet':'pen');
    const favWins = (phase==='pen') ? (Math.random()<qpen) : (Math.random()<q);
    const iW = favWins?iFav:iUnd, iL = favWins?iUnd:iFav;
    const sc = phase==='reg' ? scoreReg(favWins,lamF,lamU)
             : phase==='aet' ? scoreAet() : scorePen();
    return {a:ia, b:ib, w:iW, l:iL, phase, sw:sc[0], sl:sc[1]};
  }

  function runOnce(){
    const pts = effPts();
    let cur = TEAMS.map((_,i)=>i);
    const rounds=[];
    while(cur.length>1){
      const ms=[], win=[];
      for(let m=0;m<cur.length;m+=2){
        const res = playMatch(cur[m], cur[m+1], pts);
        ms.push(res); win.push(res.w);
      }
      rounds.push(ms); cur=win;
    }
    const champ = cur[0];
    const finalM = rounds[rounds.length-1][0];
    const vize = finalM.l;
    const hfR = rounds[rounds.length-2];          // 2 Halbfinals
    const l1=hfR[0].l, l2=hfR[1].l;
    const third3 = playMatch(l1, l2, pts);        // Spiel um Platz 3
    return {rounds, champ, vize, third:third3.w, fourth:third3.l, l1, l2, finalM, third3};
  }

  // ---------- Rendering ----------
  const $ = id => document.getElementById(id);

  // ---- Info-Erklärungen (Popups) ----
  const INFO = {
    div:{t:"Divisor", h:`<p>Steuert über die Elo-Logik, wie stark der Punkteunterschied zweier Teams die Siegchance bestimmt.</p><p><b>Links (klein, bis 300):</b> schärfer — schon kleine Vorsprünge machen den Favoriten fast unschlagbar.<br><b>Rechts (groß, bis 800):</b> ausgeglichener — auch Außenseiter haben realistische Chancen.</p><p>P(A&nbsp;schlägt&nbsp;B) = 1 / (1 + 10^((P<sub>B</sub>−P<sub>A</sub>)/Divisor)). Bei 600 ergibt ein Vorsprung von 600&nbsp;Punkten rund 91&nbsp;% Siegchance, bei 300 schon ~99&nbsp;%.</p>`},
    home:{t:"Heimvorteil", h:`<p>Die Gastgeber <b>USA, Kanada und Mexiko</b> bekommen einen Bonus auf ihre Weltranglisten-Punkte, um den Heimvorteil abzubilden.</p><p>Der Regler stellt die Höhe ein (0–150&nbsp;Punkte). Zur Einordnung: 75&nbsp;Punkte entsprechen etwa dem Abstand zwischen einem starken und einem mittleren Team.</p>`},
    tf:{t:"Turnierfaktor", h:`<div class="iwarn">⚠ Statistisch <b>nicht</b> nachweisbar (I²&nbsp;=&nbsp;0&nbsp;%, p&nbsp;=&nbsp;0,54). Reines „Was wäre, wenn die Punktschätzungen doch etwas bedeuten“. Nur die 19&nbsp;Teams mit ≥&nbsp;5 WM-Teilnahmen erhalten einen Wert; die übrigen 13 bleiben ohne Bonus.</div><p>Der Faktor misst, wie stark ein Team in seinen WM-Spielen vom <b>Elo-Erwartungswert</b> abwich (Elfmeterschießen elo-neutral). Positiv = lief im Turnier über der eigenen Spielstärke; der Wert wird als Elo-Bonus eingerechnet.</p><div class="fp-title">Turnierfaktor je Team · 95 %-Intervalle</div><div id="fpHost"></div><p>Jedes Intervall kreuzt die Null, der gepoolte Effekt (Raute) liegt praktisch bei null — <b>kein nachweisbarer Turnier-Effekt</b>. Deshalb nur ein An/Aus-Schalter, keine Feinregelung.</p>`},
    tabs:{t:"Die zwei Ansichten", h:`<p><b>Wahrscheinlichkeiten:</b> Aus zehntausenden simulierten Turnieren wird gezählt, wie oft jedes Team welche Runde erreicht — als Prozent. <b>AF</b>&nbsp;Achtelfinale, <b>VF</b>&nbsp;Viertelfinale, <b>HF</b>&nbsp;Halbfinale, <b>F</b>&nbsp;Finale, <b>WM</b>&nbsp;Titel. Die statistische Gesamtsicht über alle Läufe.</p><p><b>Ein mögliches Turnier:</b> Es wird genau <b>ein</b> Turnier ausgelost und der komplette K.-o.-Baum mit konkreten Ergebnissen gezeigt — ein einzelnes Beispiel, wie die WM ablaufen könnte. Jedes Würfeln liefert ein neues.</p>`}
  };
  const imodal=$("imodal"), imodalTitle=$("imodalTitle"), imodalBody=$("imodalBody");
  function openInfo(key){
    const it=INFO[key]; if(!it) return;
    imodalTitle.textContent=it.t; imodalBody.innerHTML=it.h;
    imodal.classList.add("on");
    if(key==="tf"){ const fh=$("fpHost"); if(fh) fh.innerHTML=buildForestSVG(); }
  }
  function closeInfo(){ imodal.classList.remove("on"); }
  document.querySelectorAll(".ibtn").forEach(btn=>btn.addEventListener("click",()=>openInfo(btn.dataset.info)));
  const probList=$("probList"), probStatus=$("probStatus");

  function funnelBar(d){
    // verschachtelte Runden als gestufter Balken: gold(WM) -> aussen dunkler(AF)
    const seq=[[d.tit,'#f4c64a'],[d.fin,'#6e9bf0'],[d.hf,'#46639a'],[d.vf,'#33486e'],[d.af,'#243450']];
    let parts=[];
    for(let i=0;i<seq.length;i++){
      const start = i===0 ? 0 : seq[i-1][0];
      parts.push(`${seq[i][1]} ${start}% ${seq[i][0]}%`);
    }
    parts.push(`#141f33 ${d.af}%`);
    return `<span class="fbar" style="background:linear-gradient(90deg,${parts.join(',')})"></span>`;
  }

  function renderProb(data, ms){
    data.sort((a,b)=> b.tit - a.tit);
    const code = nameMode==='code';
    let html = `<div class="phead"><span class="pf"></span><span class="pteam"></span>`
      + `<span class="pcol">AF</span><span class="pcol">VF</span><span class="pcol">HF</span>`
      + `<span class="pcolf">F</span><span class="pwm">WM</span><span class="pfunnel"></span></div>`;
    data.forEach((d,rank)=>{
      const t=TEAMS[d.i], top=rank<4?' top':'';
      html += `<div class="prow${top}"><span class="pf">${t.f}</span>`
        + `<span class="pteam">${code?t.c:t.n}</span>`
        + `<span class="pcol">${d.af.toFixed(0)}</span><span class="pcol">${d.vf.toFixed(0)}</span>`
        + `<span class="pcol">${d.hf.toFixed(0)}</span><span class="pcolf">${d.fin.toFixed(1)}</span>`
        + `<span class="pwm">${d.tit.toFixed(1)}</span>`
        + `<span class="pfunnel">${funnelBar(d)}</span></div>`;
    });
    probList.innerHTML = html;
    probList.className = 'rowlist ' + (code ? 'mode-c' : 'mode-n');
    probStatus.textContent = `${NRUN.toLocaleString("de-DE")} Turniere · ${(NRUN*31/1e6).toLocaleString("de-DE",{minimumFractionDigits:1,maximumFractionDigits:1})} Mio. Spiele · Divisor ${DIV}`
      + (HOME_ON?` · Heimvorteil +${HOME_BONUS}`:``)
      + (TF_ON?` · Turnierfaktor ${Math.round(TF_STR*100)}%`:``) + ` · ${ms.toFixed(0)} ms`;
  }

  let pending=false;
  function recompute(){
    if(pending) return;
    pending=true;
    probStatus.textContent = `Simuliere ${NRUN.toLocaleString("de-DE")} Turniere …`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const t0=performance.now();
      const data=runMany(NRUN);
      const ms=performance.now()-t0;
      lastProb={data, ms};
      renderProb(data, ms);
      pending=false;
    }));
  }

  const RLAB=["Letzte 32","Achtelf.","Viertelf.","Halbf.","Finale"];
  const RCOUNT=[16,8,4,2,1];
  let tzoom=1.0;

  // Spaltenbreiten so berechnen, dass alle 5 Runden in die Bildschirmbreite passen
  function layoutTree(){
    const wrap=$("treeWrap"), tree=$("tree");
    const availW = wrap.clientWidth - 14;          // wrap-padding (7*2)
    const GAP=6, gapsTotal=4*GAP;                   // 4 Lücken zwischen 5 Spalten
    const colW = Math.max(50, Math.floor((availW - gapsTotal) / 5));
    tree.style.setProperty("--colw", colW+"px");
  }

  function tslot(idx, isWin, goals, phase){
    const t=TEAMS[idx];
    let g='';
    if(goals!==null && goals!==undefined){
      const dg = goals>=10 ? 9 : goals;                       // einstellig halten
      const over = phase && phase!=='reg';                    // Spiel ging über 90
      let mk='', mkc='';                                      // nur bei Verlängerung/Elfer ein Kürzel
      if(isWin && over){ mk = phase==='pen'?'n.E.':'n.V.'; mkc='tmo'; }
      g = `<span class="tg">${dg}</span><span class="tm ${mkc}">${mk}</span>`;
    }
    return `<div class="tslot ${isWin?'win':'lose'}"><span class="tf">${t.f}</span>`
      + `<span class="tn">${teamLabel(t)}</span>${g}</div>`;
  }

  function renderTree(sim){
    const c=TEAMS[sim.champ];
    $("tree").classList.toggle('codemode', nameMode==='code');
    let html='<svg class="tlines"></svg>';
    for(let r=0;r<5;r++){
      const isFin = r===4;
      html += `<div class="tcol c${r}${isFin?' finalcol':''}">`
        + `<div class="tlabel">${RLAB[r]}</div>`;
      if(isFin) html += `<div class="finalwrap">`;
      for(let p=0;p<RCOUNT[r];p++){
        const m=sim.rounds[r][p];
        const show = scoresVisible();
        const ga = m.w===m.a ? m.sw : m.sl;
        const gb = m.w===m.b ? m.sw : m.sl;
        html += `<div class="mbox" data-r="${r}" data-p="${p}">`
          + tslot(m.a, m.w===m.a, show?ga:null, m.phase)
          + tslot(m.b, m.w===m.b, show?gb:null, m.phase) + `</div>`;
      }
      if(isFin){
        html += `<div class="champbox"><div class="cuptag">Weltmeister</div>`
          + `<span class="cup2">🏆</span>`
          + `<span class="cn"><span class="cf">${c.f}</span>${teamLabel(c)}</span></div></div>`;
      }
      html += `</div>`;
    }
    $("tree").innerHTML = html;
    layoutTree();
    applyTreeZoom();
    requestAnimationFrame(drawTreeLines);
    renderFinish(sim);
  }

  function boxRect(tree, base, z, r, p){
    const el = tree.querySelector(`.mbox[data-r="${r}"][data-p="${p}"]`);
    if(!el) return null;
    const b = el.getBoundingClientRect();
    return {l:(b.left-base.left)/z, r:(b.right-base.left)/z, t:(b.top-base.top)/z, h:b.height/z};
  }

  function drawTreeLines(){
    const tree=$("tree"); const svg=tree.querySelector("svg.tlines");
    if(!svg) return;
    const z=tzoom; const base=tree.getBoundingClientRect();
    const W=tree.offsetWidth, H=tree.offsetHeight;
    svg.setAttribute("viewBox",`0 0 ${W} ${H}`); svg.setAttribute("width",W); svg.setAttribute("height",H);
    let paths="";
    for(let r=0;r<4;r++){
      for(let p=0;p<RCOUNT[r];p++){
        const a=boxRect(tree,base,z,r,p), par=boxRect(tree,base,z,r+1,Math.floor(p/2));
        if(!a||!par) continue;
        const sx=a.r, sy=a.t+a.h/2, dx=par.l, dy=par.t+par.h/2, mx=(sx+dx)/2;
        paths += `<path d="M${sx} ${sy} H${mx} V${dy} H${dx}" fill="none" stroke="#2a3a5e" stroke-width="1.4"/>`;
      }
    }
    const fin=boxRect(tree,base,z,4,0), cEl=tree.querySelector(".champbox");
    if(fin && cEl){
      const cb=cEl.getBoundingClientRect();
      const cx=(cb.left-base.left)/z + (cb.width/z)/2;   // Mitte der Champion-Box
      const cy=(cb.top-base.top)/z;                       // Oberkante Champion-Box
      const fx=fin.l + (fin.r-fin.l)/2;                   // Mitte des Finale-Matches
      const fyB=fin.t+fin.h;                              // Unterkante Finale-Match
      paths += `<path d="M${fx} ${fyB} V${cy}" fill="none" stroke="var(--gold)" stroke-width="1.6"/>`;
    }
    svg.innerHTML=paths;
  }

  function applyTreeZoom(){
    const tree=$("tree"), zEl=$("treeZoom");
    tree.style.transform = tzoom===1 ? "none" : `scale(${tzoom})`;
    zEl.style.width  = (tree.offsetWidth*tzoom)+"px";
    zEl.style.height = (tree.offsetHeight*tzoom)+"px";
  }

  function frow(pos,idx,gold){
    const t=TEAMS[idx];
    return `<div class="frow${gold?' gold':''}"><span class="fp">${pos}</span>`
      + `<span class="ff">${t.f}</span><span class="fn">${teamLabel(t)}</span></div>`;
  }
  function renderFinish(sim){
    $("singleFinish").innerHTML = `<div class="cup">🏆</div>`
      + `<div class="finish"><div class="ft">Endstand</div>`
      + frow(1,sim.champ,true) + frow(2,sim.vize,false)
      + frow(3,sim.third,false) + frow(4,sim.fourth,false) + `</div>`;
  }

  // ---------- UI-Verdrahtung ----------
  function setFill(el){
    const min=+el.min, max=+el.max, v=+el.value;
    el.style.setProperty("--fill", ((v-min)/(max-min)*100)+"%");
  }

  const divSld=$("divSld"), divVal=$("divVal");
  divSld.addEventListener("input",()=>{ DIV=+divSld.value; divVal.textContent=DIV; setFill(divSld);
    recompute(); });

  const homeTog=$("homeTog"), homeSld=$("homeSld"), homeHint=$("homeHint");
  function homeUpdate(){
    HOME_ON=homeTog.checked; HOME_BONUS=+homeSld.value;
    homeSld.disabled=!HOME_ON;
    homeHint.textContent = HOME_ON ? `+${HOME_BONUS}` : "aus";
    setFill(homeSld); recompute();
  }
  homeTog.addEventListener("change",homeUpdate);
  homeSld.addEventListener("input",homeUpdate);

  // ----- Turnierfaktor -----
  const tfTog=$("tfTog");
  function tfUpdate(){ TF_ON=tfTog.checked; recompute(); }   // feste Stärke 100 %, nur an/aus
  tfTog.addEventListener("change",tfUpdate);

  // Forest-Plot (19 belastbare Teams), als SVG im App-Stil
  const TF_DATA=[
    {n:"Kroatien",v:0.56,se:0.412},{n:"Belgien",v:0.51,se:0.292},
    {n:"Argentinien",v:0.48,se:0.415},{n:"Frankreich",v:0.47,se:0.475},
    {n:"Deutschland",v:0.40,se:0.336},{n:"Niederlande",v:0.35,se:0.424},
    {n:"Marokko",v:0.30,se:0.522},{n:"Paraguay",v:0.20,se:0.202},
    {n:"Schweiz",v:0.18,se:0.212},{n:"Brasilien",v:0.17,se:0.47},
    {n:"Mexiko",v:0.06,se:0.197},{n:"Kolumbien",v:-0.05,se:0.395},
    {n:"Schweden",v:-0.06,se:0.545},{n:"Australien",v:-0.09,se:0.272},
    {n:"Spanien",v:-0.12,se:0.228},{n:"Japan",v:-0.14,se:0.339},
    {n:"Portugal",v:-0.19,se:0.252},{n:"England",v:-0.32,se:0.262},
    {n:"USA",v:-0.36,se:0.211}
  ];
  function esc(s){return s;}
  function buildForestSVG(){
    const W=336, padL=84, padR=30, plotW=W-padL-padR;
    const rowH=14, top=5, n=TF_DATA.length;
    const diaY=top+n*rowH+12, H=diaY+16;
    const xmin=-0.75, xmax=0.75;
    const xs=v=> padL + (Math.max(xmin,Math.min(xmax,v))-xmin)/(xmax-xmin)*plotW;
    const xc=v=> padL + (v-xmin)/(xmax-xmin)*plotW; // ungeklemmt, fürs Mittel
    const x0=xs(0);
    const ws=TF_DATA.map(d=>1/(d.se*d.se));
    const wmin=Math.min(...ws), wmax=Math.max(...ws);
    let s=`<svg class="fpsvg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
    s+=`<line x1="${x0}" y1="${top-2}" x2="${x0}" y2="${diaY+5}" stroke="#9fb0d6" stroke-width="1" stroke-dasharray="3 3" opacity="0.65"/>`;
    [-0.5,0,0.5].forEach(t=>{ s+=`<text x="${xc(t)}" y="${H-2}" fill="#9fb0d6" font-size="8" text-anchor="middle">${t>0?'+':''}${t}</text>`; });
    TF_DATA.forEach((d,i)=>{
      const y=top+i*rowH+rowH/2;
      const lo=xs(d.v-2*d.se), hi=xs(d.v+2*d.se);
      const r=2.3+(1/(d.se*d.se)-wmin)/(wmax-wmin)*3.0;
      s+=`<text x="${padL-5}" y="${y+3}" fill="#e7edff" font-size="9" text-anchor="end">${d.n}</text>`;
      s+=`<line x1="${lo}" y1="${y}" x2="${hi}" y2="${y}" stroke="#5a6a8e" stroke-width="1.2"/>`;
      s+=`<circle cx="${xs(d.v)}" cy="${y}" r="${r.toFixed(1)}" fill="#6e9bf0" stroke="#0f1830" stroke-width="0.8"/>`;
      s+=`<text x="${W-2}" y="${y+3}" fill="#9fb0d6" font-size="8" text-anchor="end">${d.v>0?'+':''}${d.v.toFixed(2)}</text>`;
    });
    const gv=0.047, gse=0.066, dc=xc(gv), dl=xc(gv-2*gse), dr=xc(gv+2*gse), dh=4;
    s+=`<polygon points="${dl},${diaY} ${dc},${diaY-dh} ${dr},${diaY} ${dc},${diaY+dh}" fill="#f4c64a" stroke="#0f1830" stroke-width="0.8"/>`;
    s+=`<text x="${padL-5}" y="${diaY+3}" fill="#f4c64a" font-size="8.5" font-weight="700" text-anchor="end">Gepoolt</text>`;
    s+=`</svg>`;
    return s;
  }



  $("imodalX").addEventListener("click",closeInfo);
  imodal.addEventListener("click",e=>{ if(e.target===imodal) closeInfo(); });

  $("simBtn").addEventListener("click", recompute);

  // Tabs
  const tabProb=$("tabProb"), tabSingle=$("tabSingle");
  const viewProb=$("viewProb"), viewSingle=$("viewSingle");
  let rolledOnce=false;
  function showTab(which){
    const p = which==="prob";
    tabProb.classList.toggle("on",p); tabSingle.classList.toggle("on",!p);
    viewProb.classList.toggle("on",p); viewSingle.classList.toggle("on",!p);
    if(!p && !rolledOnce){ rolledOnce=true; requestAnimationFrame(roll); }
  }
  tabProb.addEventListener("click",()=>showTab("prob"));
  tabSingle.addEventListener("click",()=>showTab("single"));

  function roll(){ lastSim = runOnce(); renderTree(lastSim); }
  $("rollBtn").addEventListener("click",roll);

  // Zoom Turnierbaum (100% = passt komplett; höher = Details, scrollbar)
  const tzSld=$("tzSld");
  function setTZoom(v){
    tzoom = Math.max(0.60, Math.min(2.20, v));
    tzSld.value = Math.round(tzoom*100);
    setFill(tzSld); applyTreeZoom();
    requestAnimationFrame(drawTreeLines);
  }
  tzSld.addEventListener("input", ()=> setTZoom(+tzSld.value/100));
  $("tzIn").addEventListener("click", ()=> setTZoom(tzoom+0.15));
  $("tzOut").addEventListener("click", ()=> setTZoom(tzoom-0.15));

  // Bei Größenänderung (Drehung) Spalten neu einpassen
  let rsz;
  window.addEventListener("resize", ()=>{
    clearTimeout(rsz);
    rsz = setTimeout(()=>{ if($("tree").children.length){ layoutTree(); applyTreeZoom();
      requestAnimationFrame(drawTreeLines); } }, 150);
  });

  // Namensanzeige umschalten (beide Toggle-Instanzen synchron, kein Neu-Rechnen)
  function setNameMode(m){
    if(m===nameMode) return;
    nameMode = m;
    document.querySelectorAll(".nmtog button").forEach(b=>
      b.classList.toggle("on", b.dataset.mode===m));
    if(lastProb) renderProb(lastProb.data, lastProb.ms);
    if(lastSim)  renderTree(lastSim);
  }
  document.querySelectorAll(".nmtog").forEach(g=>
    g.addEventListener("click", e=>{
      const b=e.target.closest("button"); if(!b) return;
      setNameMode(b.dataset.mode);
    }));

  // Init
  setFill(divSld); setFill(homeSld); setFill(tzSld);
  recompute();
})();
[[SCRIPTEND]]
</body>

</script>
  <script>
  (function(){
    "use strict";
    var fb=document.getElementById('fb'), fs=document.getElementById('fs');
    var loaded={b:false,s:false};
    function unesc(s){ return s.replace(/\[\[SCRIPTEND\]\]/g, '</'+'script>'); }
    function load(w){
      if(w==='b' && !loaded.b){ fb.srcdoc=unesc(document.getElementById('srcB').textContent); loaded.b=true; }
      if(w==='s' && !loaded.s){ fs.srcdoc=unesc(document.getElementById('srcS').textContent); loaded.s=true; }
    }
    function show(w){
      load(w);
      fb.classList.toggle('hidden', w!=='b');
      fs.classList.toggle('hidden', w!=='s');
      var tabs=document.querySelectorAll('.swtab');
      for(var i=0;i<tabs.length;i++){ tabs[i].classList.toggle('active', tabs[i].dataset.v===w); }
    }
    var tabs=document.querySelectorAll('.swtab');
    for(var i=0;i<tabs.length;i++){ tabs[i].addEventListener('click', (function(t){ return function(){ show(t.dataset.v); }; })(tabs[i])); }
    load('b'); // K.o.-Runde sofort, Simulation erst bei Bedarf
  })();
  </script>
